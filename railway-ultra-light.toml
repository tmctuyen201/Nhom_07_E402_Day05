[build]
builder = "NIXPACKS"
# Force minimal build
buildCommand = "pip install fastapi uvicorn pydantic python-dotenv"

[deploy]
startCommand = "python vinfast-assistant/backend/main.light.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3