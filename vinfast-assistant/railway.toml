[build]
builder = "DOCKERFILE"
buildCommand = "docker build -t vinfast-assistant ."

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[build.watchPatterns]
# Rebuild when these files change
- "backend/**"
- "requirements.txt"
- "Dockerfile"
- "start.sh"